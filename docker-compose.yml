version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: musicuser
      POSTGRES_PASSWORD: musicpassword
      POSTGRES_DB: musicstore
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build:
      context: ./src/MusicStoreApp
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    environment:
      - DB_CONNECTION_STRING=Host=postgres;Database=musicstore;Username=musicuser;Password=musicpassword
    depends_on:
      - postgres
